name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Type-gate: the 2026-07 Glow data corruption shipped because nothing ran tsc
      - run: npm run check

      # Data-gate: Roam catalog schema + quiz-coverage validation
      - run: node scripts/validate-roam-data.mjs

      # Data-gate: all-inclusive resorts — schema, region floors, video-coverage
      # floor, and the no-invented-prices rule
      - run: node scripts/validate-roam-resorts.mjs

      - run: npm run build

      - name: Deploy to Netlify
        run: npx netlify-cli@latest deploy --dir=dist/public --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
