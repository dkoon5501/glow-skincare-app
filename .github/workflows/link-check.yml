name: Link check

on:
  schedule:
    # 1st of every month, 14:00 UTC
    - cron: "0 14 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Amazon and YouTube links
        id: check
        continue-on-error: true
        run: node scripts/check-links.mjs --out link-report.json --summary link-summary.md

      - name: Upload full JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: |
            link-report.json
            link-summary.md
          if-no-files-found: ignore

      - name: Open or update issue
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list --state open --search '"Dead links detected" in:title' --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file link-summary.md
            echo "Updated existing issue #$existing"
          else
            gh issue create --title "Dead links detected" --body-file link-summary.md
            echo "Created new issue"
          fi

      - name: Fail workflow when dead links exist
        if: steps.check.outcome == 'failure'
        run: exit 1
